# Release pipeline for the @w3tech.io/* workspace packages.
#
# Publishing is TOKENLESS: it uses npm Trusted Publishing (OIDC). The runner mints a
# short-lived OIDC id-token (id-token: write) which the npm CLI exchanges under the hood
# for a ~1h package-scoped publish credential. There is intentionally no long-lived publish
# token anywhere in this file.
#
# Provenance is emitted for all packages (NPM_CONFIG_PROVENANCE + --provenance). Note
# that npm only attaches provenance attestations when BOTH the source repo AND the package
# are public; installing the private @w3tech.io/* deps from the registry would require a
# read token until the repo + packages are public (moot once public — local frozen-lockfile
# resolution uses the in-repo workspace tree, not the registry).
#
# The per-package npmjs.com trusted-publisher config must reference THIS exact, case-sensitive
# filename: publish.yml.
name: Publish

# Releases are tag-driven: pushing a `vX.Y.Z` git tag is the single trigger AND the version
# source. The workflow NEVER creates tags — it only reacts to one. workflow_dispatch offers a
# manual escape hatch that takes the same `vX.Y.Z` tag as an input (e.g. to re-run a release).
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

# Serialize releases so two tags cannot publish concurrently.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Least privilege at the workflow level; the release job widens only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod # release gate (tag-deployment policy v*); the bootstrap NPMJS_TOKEN it once held is gone (publishing is now tokenless OIDC)
    permissions:
      id-token: write # OIDC token exchange for tokenless Trusted Publishing (critical)
      contents: write # action-gh-release creates the GitHub Release
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so action-gh-release can diff release notes to the previous tag.
          fetch-depth: 0
          # On workflow_dispatch, check out the named tag; on push:tags this input is empty
          # and checkout defaults to the pushed tag ref (which is correct).
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v6

      # NOTE: package-manager caching is deliberately DISABLED in the release job per npm
      # Trusted Publishing guidance (no `cache: 'pnpm'` here, unlike ci.yml).
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      # The OIDC token exchange is performed by the npm CLI under the hood even when pnpm
      # orchestrates the publish, so npm must be >= 11.5.1.
      # Pin the npm major (npm@12, not @latest) so an npm major bump can't surprise CI; node
      # is on the 22.x line above (>= 22.22.2), which satisfies npm@12's engine requirement.
      - name: Ensure npm >= 11.5.1 for OIDC
        run: |
          npm i -g npm@12
          npm -v

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      # Derive the release version + dist-tag from the tag. The tag is the single version
      # source — the workflow never creates tags. This MUST run before the version stamp and
      # the publish.
      #
      # Version shape: vX.Y.Z with an OPTIONAL prerelease suffix after a dash (anything goes —
      # `-rc.1`, `-beta.2`, `-alpha`, `-foo.3`, ...). We do NOT compare against the published
      # version: multiple major lines may receive their own minors/patches, so an "older"
      # number is a legitimate release, not a regression.
      #
      # dist-tag: a plain vX.Y.Z (no suffix) → `latest` (the default `npm install` channel).
      # A prerelease (`-<suffix>`) is NEVER `latest` → the leading alpha id of the suffix
      # (rc/beta/alpha/...), a numeric-only suffix → `pre`.
      - name: Derive version + dist-tag from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          # Strip a single leading 'v'.
          VERSION="${RAW#v}"
          # SemVer guard: vX.Y.Z + optional `-<anything non-empty>` prerelease suffix.
          if ! printf '%s' "$RAW" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-.+)?$'; then
            echo "::error::Tag '$RAW' is not a vX.Y.Z or vX.Y.Z-<suffix> tag." >&2
            exit 1
          fi
          # Derive a non-`latest` dist-tag.
          case "$VERSION" in
            *-*)
              SUFFIX="${VERSION#*-}"
              DIST_TAG="$(printf '%s' "$SUFFIX" | grep -oE '^[A-Za-z]+' || true)"
              [ -n "$DIST_TAG" ] || DIST_TAG="pre"
              ;;
            *)
              DIST_TAG="latest"
              ;;
          esac
          echo "Releasing version: $VERSION  (dist-tag: $DIST_TAG)"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "DIST_TAG=$DIST_TAG" >> "$GITHUB_ENV"

      # Lockstep-stamp the tag version into every workspace package.json and resolve
      # workspace:* to concrete versions at publish time. --no-git-tag-version ensures NO git
      # commit/tag is created and the bump is NOT committed back to main — it lives only in
      # the runner. Runs AFTER the frozen-lockfile install (the stamp mutates versions, not
      # the workspace:* lockfile specifiers) and BEFORE the publish.
      # --allow-same-version: the tag is the sole version source, so releasing vX.Y.Z when the
      # committed package.json baseline is already X.Y.Z (e.g. the first tag after a manifest
      # bump PR) must NOT fail with ERR_PNPM_VERSION_NOT_CHANGED — it re-stamps to the same
      # value and proceeds to publish.
      - name: Stamp version across all packages (lockstep)
        run: pnpm version "$VERSION" --no-git-tag-version --allow-same-version -r

      # Publish all workspace packages under the derived dist-tag ($DIST_TAG: `latest` for a plain
      # vX.Y.Z, the prerelease channel otherwise). Build already ran above; here we gate with a
      # --dry-run then do the real publish, both pinned to $DIST_TAG so prereleases never land
      # on `latest`. --no-git-checks is REQUIRED — publish runs from a detached HEAD at the
      # tag. Publishing is fully tokenless: npm exchanges the OIDC id-token (id-token: write)
      # for a short-lived publish credential against the per-package trusted-publisher
      # registered on npmjs.com. There is no NODE_AUTH_TOKEN fallback any more (bootstrap done).
      - name: Publish (dist-tag $DIST_TAG; tokenless OIDC + provenance)
        run: |
          pnpm -r publish --provenance --no-git-checks --tag "$DIST_TAG" --dry-run
          pnpm -r publish --provenance --no-git-checks --tag "$DIST_TAG"
        env:
          NPM_CONFIG_PROVENANCE: 'true'

      # Create the GitHub Release with auto-generated, PR-label-categorized notes
      # (.github/release.yml). Pinned to an immutable commit SHA, never a moving tag.
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
