# Release pipeline for the four @w3tech.io/* packages.
#
# Publishing is TOKENLESS: it uses npm Trusted Publishing (OIDC). The runner mints a
# short-lived OIDC id-token (id-token: write) which the npm CLI exchanges under the hood
# for a ~1h package-scoped publish credential. There is intentionally no long-lived publish
# token anywhere in this file.
#
# Provenance is emitted for all four packages (NPM_CONFIG_PROVENANCE + --provenance). Note
# that npm only attaches provenance attestations when BOTH the source repo AND the package
# are public; installing the private @w3tech.io/* deps from the registry would require a
# read token until the repo + packages are public (moot once public — local frozen-lockfile
# resolution uses the in-repo workspace tree, not the registry).
#
# The per-package npmjs.com trusted-publisher config must reference THIS exact, case-sensitive
# filename: publish.yml.
name: Publish

# Releases are tag-driven: pushing a `vX.Y.Z` git tag is the single trigger AND the version
# source. The workflow NEVER creates tags — it only reacts to one. workflow_dispatch offers a
# manual escape hatch that takes the same `vX.Y.Z` tag as an input (e.g. to re-run a release).
on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

# Serialize releases so two tags cannot publish concurrently.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

# Least privilege at the workflow level; the release job widens only what it needs.
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: prod # holds the temporary NPMJS_TOKEN used to bootstrap the first publish
    permissions:
      id-token: write # OIDC token exchange for tokenless Trusted Publishing (critical)
      contents: write # action-gh-release creates the GitHub Release
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so action-gh-release can diff release notes to the previous tag.
          fetch-depth: 0
          # On workflow_dispatch, check out the named tag; on push:tags this input is empty
          # and checkout defaults to the pushed tag ref (which is correct).
          ref: ${{ inputs.tag }}

      - uses: pnpm/action-setup@v4

      # NOTE: package-manager caching is deliberately DISABLED in the release job per npm
      # Trusted Publishing guidance (no `cache: 'pnpm'` here, unlike ci.yml).
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14'
          registry-url: 'https://registry.npmjs.org'

      # The OIDC token exchange is performed by the npm CLI under the hood even when pnpm
      # orchestrates the publish, so npm must be >= 11.5.1.
      - name: Ensure npm >= 11.5.1 for OIDC
        run: |
          npm i -g npm@latest
          npm -v

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r build

      # Derive the release version from the tag and guard it: strict SemVer + non-regression
      # vs the currently-published version. The tag is the single version source — the
      # workflow never creates tags. This MUST run before the version stamp and the publish.
      - name: Derive and guard version from tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          # Strip a single leading 'v'.
          VERSION="${RAW#v}"
          # Strict SemVer guard (vX.Y.Z form).
          if ! printf '%s' "$RAW" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$RAW' is not a strict SemVer vX.Y.Z tag." >&2
            exit 1
          fi
          # Non-regression check vs the published version. A missing package (E404) means
          # nothing is published yet (bootstrap) — that is NOT a regression, treat as pass.
          PUBLISHED="$(npm view @w3tech.io/vrpc-core version 2>/dev/null || true)"
          if [ -n "$PUBLISHED" ]; then
            GREATEST="$(printf '%s\n%s\n' "$PUBLISHED" "$VERSION" | sort -V | tail -n1)"
            if [ "$VERSION" = "$PUBLISHED" ] || [ "$GREATEST" != "$VERSION" ]; then
              echo "::error::Version '$VERSION' does not strictly exceed published '$PUBLISHED'." >&2
              exit 1
            fi
          else
            echo "No published version found for @w3tech.io/vrpc-core — bootstrap publish (not a regression)."
          fi
          echo "Releasing version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      # Lockstep-stamp the tag version into all four package.json files and resolve
      # workspace:* to concrete versions at publish time. --no-git-tag-version ensures NO git
      # commit/tag is created and the bump is NOT committed back to main — it lives only in
      # the runner. Runs AFTER the frozen-lockfile install (the stamp mutates versions, not
      # the workspace:* lockfile specifiers) and BEFORE the publish.
      - name: Stamp version across all packages (lockstep)
        run: pnpm version "$VERSION" --no-git-tag-version -r

      # Reuse the existing release body (build && publish:dry-run && pnpm -r publish
      # --provenance --no-git-checks). --no-git-checks is REQUIRED — publish runs from a
      # detached HEAD at the tag. npm tries OIDC first (id-token: write) and falls back to
      # NODE_AUTH_TOKEN when no per-package trusted-publisher is registered yet, so this same
      # workflow bootstraps (token) then later runs tokenless (OIDC).
      - name: Publish (tokenless OIDC + provenance, token fallback for bootstrap)
        run: pnpm run release
        env:
          NPM_CONFIG_PROVENANCE: 'true'
          # Phase 52 (BOOT-03) removes this line after the per-package trusted-publisher is
          # registered on npmjs.com → fully tokenless OIDC + provenance.
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

      # Create the GitHub Release with auto-generated, PR-label-categorized notes
      # (.github/release.yml). Pinned to an immutable commit SHA, never a moving tag.
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
