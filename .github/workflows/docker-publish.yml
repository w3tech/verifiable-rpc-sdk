name: docker-publish

# Release image pipeline: on every v*.*.* tag, build and push
# ghcr.io/w3tech/vrpc-proxy (semver + latest tags), cosign-keyless sign the
# pushed digest, verify the signature in-workflow, then attest build
# provenance twice — the image by digest (pushed to the registry) and the
# extracted cli.js bundle file. Auth is the built-in GITHUB_TOKEN; signing and
# attestation use the runner's OIDC identity (no long-lived secrets).
#
# HERMETIC: every layer is rebuilt from the tagged checkout; the shared build
# cache is never read, so the attestation covers actually-built bytes.
#
# No manual dispatch trigger: docker/metadata-action derives image tags from
# the git ref, and a branch-ref dispatch would mint wrong tags. To retry a
# failed release, re-run the failed run from the Actions UI (same ref, same
# tags). This workflow never creates or edits the GitHub release and never
# uploads release assets — publish.yml owns the release, and immutable
# releases reject post-publish asset changes.

on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  IMAGE: ghcr.io/w3tech/vrpc-proxy

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Default flavor (latest=auto) also tags `latest` for non-prerelease
          # semver tags — deliberate: v0.4.0 publishes 0.4.0 + latest.
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push image (hermetic)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          no-cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes ${{ env.IMAGE }}@${DIGEST}

      - name: Verify signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign verify ${{ env.IMAGE }}@${DIGEST} \
            --certificate-identity "https://github.com/${{ github.workflow_ref }}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/w3tech/vrpc-proxy
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Extract the EXACT file shipped in the pushed image (not a rebuild) so
      # the attested file == the in-image file for any distributed copy.
      - name: Extract bundle from pushed image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          docker pull "${IMAGE}@${DIGEST}"
          cid=$(docker create "${IMAGE}@${DIGEST}")
          docker cp "$cid":/app/cli.js ./vrpc-proxy-cli.js
          docker rm "$cid"

      - name: Attest bundle file provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: vrpc-proxy-cli.js
