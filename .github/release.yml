changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
      - github-actions[bot]
  categories:
    - title: Breaking Changes 🛠
      labels:
        - breaking
    - title: Features 🚀
      labels:
        - feature
        - enhancement
    - title: Bug Fixes 🐛
      labels:
        - bug
        - fix
    - title: Other Changes
      labels:
        - '*'
